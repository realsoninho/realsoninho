name: 🐍 Generate Snake Animation

on:
  # Roda todo dia à meia-noite (UTC) para manter a cobrinha atualizada
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:
  # Roda a cada push na branch principal
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gerar SVGs da cobrinha (claro + escuro)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#00FF9C&color_dots=#0D1117,#00583B,#009E5F,#00C977,#00FF9C

      - name: Publicar na branch "output"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
